<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task</title>
  <link rel="stylesheet" href="output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body class="relative bg-cyan-200">
  <section class=" flex justify-between mx-50 py-20 ">
    <h1 class="text-5xl font-bold">Task List</h1>
    <button id="open-modal-btn" class="bg-purple-500 p-3 w-50 h-20 text-2xl font-medium rounded-2xl text-white">
      Add Task</button>
  </section>
      <div id="form" class="fixed hidden top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 ">
      <!-- Modal content -->
      <div class="flex flex-col gap-2.5 p-5 bg-white w-100 justify-center font-medium text-xl rounded-2xl">
        <div class="flex justify-between">
          <h1>Add Task</h1>
          <span id="close" class="w-10 h-10">&times;</span>
        </div>
        <div class="flex flex-col gap-5">
          <h1>Task</h1>
          <input type="text" id="input-task-name"
            class="border-2 p-2 rounded-xl border-cyan-400 active:border-cyan-400 text-sm font-normal"
            placeholder="Web Homework">
        </div>
        <div class="flex flex-col gap-5">
          <p>Priority</p>
          <div class="flex text-sm font-normal gap-10">
            <button value="High" type="button"
              class="priority-button w-20 border-2 rounded-2xl text-red-500 border-red-500 p-2 active:text-white active:bg-red-500">
              High
            </button>
            <button value="Medium" type="button"
              class="priority-button w-20 border-2 rounded-2xl text-yellow-500 border-yellow-500 p-2 active:text-white active:bg-yellow-500">
              Meduim
            </button>
            <button value="Low" type="button"
              class="priority-button w-20 border-2 rounded-2xl text-green-500 border-green-500 p-2 active:text-white active:bg-green-500">
              Low
            </button>
          </div>
        </div>
        <div class="flex flex-col gap-5">
          <p>Status</p>
          <div class="flex text-sm font-normal gap-10">
            <button value="To Do" type="button"
              class="status-button w-20 border-2 rounded-2xl text-cyan-500 border-cyan-500 p-2 active:text-white active:bg-cyan-500">
              To Do
            </button>
            <button value="Progress" type="button"
              class="status-button w-20 border-2 rounded-2xl text-cyan-500 border-cyan-500 p-2 active:text-white active:bg-cyan-500">
              Progress
            </button>
            <button value="Done" type="button"
              class="status-button w-20 border-2 rounded-2xl text-cyan-500 border-cyan-500 p-2 active:text-white active:bg-cyan-500">
              Done
            </button>
          </div>
        </div>
        <button id="add-btn"
          class="w-30 border-2 rounded-2xl text-white bg-purple-500 text-lg font-normal  border-purple-500 p-2 self-end">Add</button>
      </div>

    </div>
  <section class="flex justify-between mx-50 p-10 bg-gray-100 rounded-3xl text-2xl font-bold text-cyan-400 text-center">
    <p class="w-1/4 text-center">Task</p>
    <p class="w-1/4 text-center">Priority</p>
    <p class="w-1/4 text-center">Status</p>
    <p class="w-1/4 text-center last:text-yellow-400">Action</p>
  </section>
  <section id="task-list-container" >
  </section>
  <script type="module" src="scripts.js"></script>
</body>

</html>
